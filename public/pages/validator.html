<div class="card max-w-5xl mx-auto relative overflow-hidden bg-white">
    <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-teal-500 to-emerald-400"></div>
    
    <div class="mb-6">
        <h2 class="text-xl font-bold text-slate-800">Validator Nomor WhatsApp</h2>
        <p class="text-sm text-slate-500 mt-1">Periksa validitas nomor tujuan secara massal untuk mendeteksi apakah nomor tersebut aktif terdaftar di WhatsApp.</p>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Kolom Input -->
        <div class="flex flex-col justify-between">
            <form id="validatorForm" class="space-y-4 flex-1 flex flex-col">
                <div>
                    <label for="number-list" class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Daftar Nomor Telepon</label>
                    <textarea id="number-list" rows="11" class="mt-2 w-full p-4 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-teal-500/10 focus:border-teal-500 transition bg-slate-50/50 text-sm font-mono leading-relaxed resize-none" placeholder="Masukkan nomor tujuan di sini, satu nomor per baris...&#10;&#10;Contoh:&#10;081234567890&#10;628987654321&#10;087712345678"></textarea>
                </div>
                <button type="submit" id="start-check-btn" class="btn-primary mt-auto">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.707l-3-3a1 1 0 00-1.414 1.414L10.586 9H7a1 1 0 100 2h3.586l-1.293 1.293a1 1 0 101.414 1.414l3-3a1 1 0 000-1.414z" clip-rule="evenodd" />
                    </svg>
                    <span>Mulai Validasi Massal</span>
                </button>
            </form>
        </div>

        <!-- Kolom Hasil -->
        <div class="flex flex-col h-full bg-slate-50/60 p-6 rounded-2xl border border-slate-200/50 min-h-[400px]">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-sm font-bold text-slate-700">Hasil Pengecekan</h3>
                <span id="results-count" class="text-xs text-slate-400 font-medium"></span>
            </div>

            <!-- Progress Bar -->
            <div id="progress-container" class="hidden mb-5 bg-white p-4 rounded-xl border border-slate-200/60 shadow-sm">
                <div class="flex justify-between items-center mb-2">
                    <p id="progress-text" class="text-xs font-semibold text-slate-600">Memeriksa...</p>
                    <span id="progress-percent" class="text-xs font-bold text-teal-600">0%</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-2">
                    <div id="progress-bar" class="bg-teal-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <!-- Output Container -->
            <div id="results-container" class="flex-1 overflow-y-auto max-h-[240px] space-y-2 pr-1.5 custom-scrollbar font-mono text-sm">
                <div class="text-slate-400 text-center py-12 flex flex-col items-center justify-center space-y-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                    </svg>
                    <p class="text-xs font-medium">Sesi validasi kosong. Hasil filter akan muncul di sini.</p>
                </div>
            </div>

            <!-- Tombol Download & Salin -->
            <div id="action-buttons" class="hidden grid grid-cols-2 gap-3 mt-4 pt-4 border-t border-slate-200/80">
                <button id="download-btn" class="btn-secondary">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-500" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                    <span>Download (.txt)</span>
                </button>
                <button id="copy-btn" class="btn-secondary">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-500" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" />
                        <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z" />
                    </svg>
                    <span>Salin Semua</span>
                </button>
            </div>
        </div>
    </div>
</div>
