<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal WA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        body { font-family: 'Inter', sans-serif; }
        .nav-link { @apply px-4 py-2 text-sm rounded-lg text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-all font-medium; }
        .nav-link.active { @apply bg-teal-50 text-teal-700 font-semibold border border-teal-200/50 shadow-sm shadow-teal-500/5; }
        .card { @apply bg-white p-6 rounded-2xl border border-slate-200/70 shadow-sm hover:shadow-md transition-all duration-300; }
        #server-log { font-family: 'JetBrains Mono', monospace; height: 420px; }
        .form-input { @apply mt-1.5 w-full p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500/10 focus:border-teal-500 transition duration-200 bg-slate-50/50 text-sm; }
        .btn-primary { @apply w-full bg-slate-900 hover:bg-slate-800 text-white p-3.5 rounded-xl font-semibold transition-all duration-200 shadow-md flex items-center justify-center space-x-2 disabled:opacity-60 disabled:cursor-not-allowed; }
        .btn-secondary { @apply w-full bg-slate-50 hover:bg-slate-100 text-slate-700 border border-slate-200/60 p-3 rounded-xl font-semibold transition-all text-sm flex items-center justify-center space-x-2; }
        pre, code { font-family: 'JetBrains Mono', monospace; }
        pre { @apply bg-slate-900 text-slate-300 p-5 rounded-xl text-xs overflow-x-auto leading-relaxed border border-slate-800/80; }
        .method-badge { @apply text-[10px] font-bold px-2 py-0.5 rounded-md uppercase tracking-wider border; }
        .method-get { @apply bg-teal-50 text-teal-700 border-teal-200/50; }
        .method-post { @apply bg-emerald-50 text-emerald-700 border-emerald-200/50; }
    </style>
</head>
<body class="bg-slate-50/50 text-slate-700 min-h-screen">
    <div id="header-container"></div>
    <main id="app-content" class="container mx-auto p-4 sm:p-8"></main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/components/header.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
