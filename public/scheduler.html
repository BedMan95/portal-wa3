<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penjadwalan Pesan - Portal WA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        body { font-family: 'Inter', sans-serif; }
        .nav-link { @apply px-4 py-2 text-sm rounded-lg text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-all font-medium; }
        .nav-link.active { @apply bg-teal-50 text-teal-700 font-semibold border border-teal-200/50 shadow-sm shadow-teal-500/5; }
        .card { @apply bg-white p-6 rounded-2xl border border-slate-200/70 shadow-sm; }
        .form-input { @apply mt-1.5 w-full p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500/10 focus:border-teal-500 transition duration-200 bg-slate-50/50 text-sm; }
    </style>
</head>
<body class="bg-slate-50/50 text-slate-700 min-h-screen">
    <div id="header-container"></div>

    <main class="container mx-auto p-4 sm:p-8 max-w-5xl grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Form Penjadwalan -->
        <div class="lg:col-span-1 space-y-6">
            <div class="card relative overflow-hidden bg-white">
                <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-teal-500 to-emerald-400"></div>
                <h2 class="text-xl font-bold text-slate-800 mb-4">Buat Jadwal Baru</h2>
                
                <form id="scheduleForm" class="space-y-4">
                    <div>
                        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Nomor Tujuan</label>
                        <input type="text" id="targets" placeholder="0812..., 0898..." class="form-input">
                    </div>
                    
                    <div>
                        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Grup Tujuan</label>
                        <select id="groupSelect" class="form-input">
                            <option value="">-- Pilih Grup --</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Pesan</label>
                        <textarea id="message" rows="3" class="form-input" placeholder="Isi pesan..."></textarea>
                    </div>

                    <div>
                        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">URL Media (Opsional)</label>
                        <input type="url" id="mediaUrl" placeholder="https://example.com/image.jpg" class="form-input">
                    </div>

                    <div>
                        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Tipe Jadwal</label>
                        <select id="scheduleType" class="form-input" onchange="toggleScheduleFields()">
                            <option value="once">Sekali Kirim (Tanggal & Waktu)</option>
                            <option value="daily">Harian</option>
                            <option value="weekly">Mingguan</option>
                            <option value="monthly">Bulanan</option>
                            <option value="custom">Custom Cron</option>
                        </select>
                    </div>

                    <div id="dateField" class="space-y-2">
                        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Tanggal</label>
                        <input type="date" id="date" class="form-input">
                    </div>

                    <div id="timeField" class="space-y-2">
                        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Waktu (HH:MM)</label>
                        <input type="time" id="time" class="form-input">
                    </div>

                    <div id="dayOfWeekField" class="space-y-2 hidden">
                        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Hari</label>
                        <select id="dayOfWeek" class="form-input">
                            <option value="1">Senin</option>
                            <option value="2">Selasa</option>
                            <option value="3">Rabu</option>
                            <option value="4">Kamis</option>
                            <option value="5">Jumat</option>
                            <option value="6">Sabtu</option>
                            <option value="0">Minggu</option>
                        </select>
                    </div>

                    <div id="dayOfMonthField" class="space-y-2 hidden">
                        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Tanggal (1-31)</label>
                        <input type="number" id="dayOfMonth" min="1" max="31" class="form-input">
                    </div>

                    <div id="cronField" class="space-y-2 hidden">
                        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Cron Expression</label>
                        <input type="text" id="cron" placeholder="* * * * *" class="form-input">
                    </div>

                    <div id="status-container" class="hidden p-3 rounded-xl border text-sm"></div>

                    <button type="submit" class="w-full py-3 rounded-xl font-bold text-sm bg-teal-600 hover:bg-teal-700 text-white transition-all">
                        Simpan Jadwal
                    </button>
                </form>
            </div>
        </div>

        <!-- Daftar Jadwal -->
        <div class="lg:col-span-2">
            <div class="card relative overflow-hidden bg-white h-full">
                <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-slate-500 to-slate-400"></div>
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-slate-800">Daftar Jadwal Aktif</h2>
                    <button onclick="loadSchedules()" class="text-teal-600 hover:text-teal-800 text-sm font-semibold">Refresh</button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm text-slate-600">
                        <thead class="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-200">
                            <tr>
                                <th class="px-4 py-3">Tipe</th>
                                <th class="px-4 py-3">Waktu/Cron</th>
                                <th class="px-4 py-3">Jadwal Berikutnya</th>
                                <th class="px-4 py-3">Pesan</th>
                                <th class="px-4 py-3 text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="scheduleList" class="divide-y divide-slate-100">
                            <tr><td colspan="5" class="px-4 py-4 text-center text-slate-400">Memuat jadwal...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/components/header.js"></script>
    <script>
        document.getElementById('header-container').innerHTML = getHeaderHTML('/scheduler.html');
        const socket = io();
        
        socket.on('schedule_updated', () => {
            loadSchedules();
        });

        function toggleScheduleFields() {
            const type = document.getElementById('scheduleType').value;
            document.getElementById('dateField').classList.toggle('hidden', type !== 'once');
            document.getElementById('timeField').classList.toggle('hidden', type === 'custom');
            document.getElementById('dayOfWeekField').classList.toggle('hidden', type !== 'weekly');
            document.getElementById('dayOfMonthField').classList.toggle('hidden', type !== 'monthly');
            document.getElementById('cronField').classList.toggle('hidden', type !== 'custom');
        }

        async function loadGroups() {
            try {
                const res = await fetch('/api/internal/get-groups');
                if (res.ok) {
                    const groups = await res.json();
                    const sel = document.getElementById('groupSelect');
                    groups.forEach(g => {
                        const o = document.createElement('option');
                        o.value = g.id; o.textContent = g.subject;
                        sel.appendChild(o);
                    });
                }
            } catch (e) { console.error('Gagal memuat grup', e); }
        }

        async function loadSchedules() {
            try {
                const res = await fetch('/api/internal/get-scheduled-jobs');
                const schedules = await res.json();
                const tbody = document.getElementById('scheduleList');
                
                if (schedules.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-4 text-center text-slate-400">Tidak ada jadwal aktif.</td></tr>';
                    return;
                }

                tbody.innerHTML = schedules.map(s => {
                    let timeDisplay = '';
                    if (s.scheduleType === 'once') timeDisplay = `${s.scheduleData.date} ${s.scheduleData.time}`;
                    else if (s.scheduleType === 'custom') timeDisplay = s.scheduleData.cron;
                    else timeDisplay = s.scheduleData.time;
                    
                    let nextRunDisplay = '-';
                    if (s.nextRun) {
                        const d = new Date(s.nextRun);
                        nextRunDisplay = d.toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
                    }

                    return `
                        <tr class="hover:bg-slate-50">
                            <td class="px-4 py-3 font-medium text-slate-800 capitalize">${s.scheduleType}</td>
                            <td class="px-4 py-3 font-mono text-xs">${timeDisplay}</td>
                            <td class="px-4 py-3 text-xs text-teal-600 font-medium">${nextRunDisplay}</td>
                            <td class="px-4 py-3 truncate max-w-[200px]">${s.message}</td>
                            <td class="px-4 py-3 text-right">
                                <button onclick="deleteSchedule('${s.id}')" class="text-red-500 hover:text-red-700 text-xs font-bold px-2 py-1 bg-red-50 rounded">Hapus</button>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (e) {
                console.error('Gagal memuat jadwal', e);
            }
        }

        async function deleteSchedule(id) {
            if (!confirm('Hapus jadwal ini?')) return;
            try {
                const res = await fetch(`/api/internal/schedule-message/${id}`, { method: 'DELETE' });
                if (res.ok) loadSchedules();
                else alert('Gagal menghapus jadwal');
            } catch (e) { alert('Error: ' + e.message); }
        }

        document.getElementById('scheduleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusEl = document.getElementById('status-container');
            
            const targets = document.getElementById('targets').value.split(',').map(t => t.trim()).filter(Boolean);
            const groupId = document.getElementById('groupSelect').value;
            const groups = groupId ? [groupId] : [];
            
            const payload = {
                targets,
                groups,
                message: document.getElementById('message').value,
                mediaUrl: document.getElementById('mediaUrl').value,
                scheduleType: document.getElementById('scheduleType').value,
                scheduleData: {
                    date: document.getElementById('date').value,
                    time: document.getElementById('time').value,
                    dayOfWeek: document.getElementById('dayOfWeek').value,
                    dayOfMonth: document.getElementById('dayOfMonth').value,
                    cron: document.getElementById('cron').value
                }
            };

            try {
                const res = await fetch('/api/internal/schedule-message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                statusEl.classList.remove('hidden', 'bg-red-50', 'text-red-700');
                statusEl.classList.add('bg-teal-50', 'text-teal-700', 'border-teal-200');
                statusEl.textContent = data.message || 'Berhasil disimpan';
                
                if (res.ok) {
                    document.getElementById('scheduleForm').reset();
                    toggleScheduleFields();
                    loadSchedules();
                } else {
                    throw new Error(data.error || 'Gagal menyimpan');
                }
            } catch (err) {
                statusEl.classList.remove('hidden', 'bg-teal-50', 'text-teal-700');
                statusEl.classList.add('bg-red-50', 'text-red-700', 'border-red-200');
                statusEl.textContent = err.message;
            }
        });

        loadGroups();
        loadSchedules();
    </script>
</body>
</html>
